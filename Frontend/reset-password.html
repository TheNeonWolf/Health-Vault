<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Create a new HealthVault password"
    >

    <title>Reset Password | HealthVault</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/accessibility.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <main class="auth-container">
        <section class="auth-sidebar">
            <div class="auth-sidebar-logo">
                <div class="brand-icon">
                    <span aria-hidden="true">✚</span>
                </div>

                <h1>HealthVault</h1>
            </div>

            <div class="auth-sidebar-content">
                <h2>
                    Create a new secure password.
                </h2>

                <p>
                    Choose a password that is difficult to guess and
                    different from passwords used on other accounts.
                </p>
            </div>
        </section>

        <section class="auth-form-panel">
            <div class="auth-card">
                <header class="auth-header">
                    <h3>Reset password</h3>

                    <p>
                        Enter and confirm your new password.
                    </p>
                </header>

                <div
                    id="resetPasswordMessage"
                    class="alert"
                    role="alert"
                    aria-live="polite"
                    hidden
                ></div>

                <form id="resetPasswordForm" novalidate>
                    <div class="form-group">
                        <label for="password">
                            New password
                        </label>

                        <div class="input-wrapper">
                            <input
                                type="password"
                                id="password"
                                name="password"
                                class="form-input"
                                placeholder="Enter a new password"
                                autocomplete="new-password"
                                minlength="8"
                                required
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">
                            Confirm new password
                        </label>

                        <div class="input-wrapper">
                            <input
                                type="password"
                                id="confirmPassword"
                                name="confirmPassword"
                                class="form-input"
                                placeholder="Enter the new password again"
                                autocomplete="new-password"
                                minlength="8"
                                required
                            >
                        </div>
                    </div>

                    <div class="auth-actions">
                        <label class="remember-me">
                            <input
                                type="checkbox"
                                id="showPasswords"
                            >

                            Show passwords
                        </label>
                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary btn-submit"
                        id="resetPasswordBtn"
                    >
                        Reset password
                    </button>
                </form>

                <footer class="auth-footer">
                    <p>
                        Return to

                        <a href="login.html">
                            login
                        </a>
                    </p>
                </footer>
            </div>
        </section>
    </main>

    <div class="accessibility-widget">
        <div
            class="access-menu"
            id="accessibilityMenu"
            aria-label="Accessibility settings"
        >
            <p class="access-title">
                Accessibility
            </p>

            <div class="access-row">
                <label for="contrastToggleBtn">
                    High contrast
                </label>

                <button
                    type="button"
                    class="access-toggle-btn"
                    id="contrastToggleBtn"
                    aria-pressed="false"
                >
                    Enable
                </button>
            </div>

            <div class="access-row">
                <span>Text size</span>

                <div class="access-btn-group">
                    <button
                        type="button"
                        class="access-btn"
                        id="decreaseTextBtn"
                        aria-label="Decrease text size"
                    >
                        A−
                    </button>

                    <output id="fontSizeOutput">
                        100%
                    </output>

                    <button
                        type="button"
                        class="access-btn"
                        id="increaseTextBtn"
                        aria-label="Increase text size"
                    >
                        A+
                    </button>
                </div>
            </div>

            <button
                type="button"
                class="btn btn-outline"
                id="resetAccessibilityBtn"
            >
                Reset settings
            </button>
        </div>

        <button
            type="button"
            class="access-trigger"
            id="accessibilityTrigger"
            aria-label="Open accessibility settings"
            aria-expanded="false"
        >
            ♿
        </button>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/accessibility.js"></script>
    <script src="js/auth/reset-password.js"></script>
</body>
</html>
